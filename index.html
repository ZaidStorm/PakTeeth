<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | PakTeeth (PakTeeth)</title>
    <link rel="icon" type="image/png" href="assets/images/tooth.png">
    <link rel="stylesheet" href="css/index.css">
</head>

<body>
    <div id="page-loader">
        <div class="loader-container">
            <div class="loader"></div>
            <span class="loader-progress">0%</span>
        </div>
    </div>
    <div class="app-container">

        <!-- LEFT SIDE -->
        <div class="login-left">

            <!-- VIDEO BACKGROUND -->
            <video class="login-video-bg" autoplay muted loop playsinline>
                <source src="assets/videos/bg-video-left.mp4" type="video/mp4">
                Your browser does not support HTML5 video.
            </video>

            <!-- Overlay for gradient / readability -->
            <div class="login-overlay"></div>

            <div class="brand">
                <div class="brand-logo" style="margin-bottom: 1rem; color: var(--accent-light);">
                    <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="lucide-tooth">
                        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" />
                        <circle cx="12" cy="9" r="3" />
                    </svg>
                </div>
                <h1>PakTeeth</h1>
                <p>A Trusted Dental Management Solution for <br>Dr. Ahmed Gulzar.</p>
            </div>


        </div>


        <!-- RIGHT SIDE -->
        <div class="login-right">

            <div class="login-card-container">

                <div class="login-card card-float">

                    <h2 class="card-title">Welcome Back</h2>
                    <p class="card-subtitle">Please sign in to access your dashboard.</p>

                    <form id="loginForm" class="login-form">

                        <div class="form-group">
                            <label class="form-label" for="email">Email Address</label>
                            <input class="form-control" type="email" id="email" required
                                placeholder="user@PakTeeth.com">
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="password">Password</label>
                            <div class="password-wrapper">
                                <input class="form-control" type="password" id="password" required
                                    placeholder="••••••••">
                                <button type="button" class="btn-icon toggle-password" id="togglePwd"
                                    title="Show/Hide Password">
                                    <svg class="eye-on" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                        <circle cx="12" cy="12" r="3" />
                                    </svg>

                                    <svg class="eye-off" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                        style="display:none">
                                        <path
                                            d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94" />
                                        <path
                                            d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19" />
                                        <line x1="1" y1="1" x2="23" y2="23" />
                                    </svg>
                                </button>
                            </div>
                        </div>

                        <div id="loginError" class="alert-danger"
                            style="display: none; color: #ff4d4d; background-color: rgba(255, 77, 77, 0.1); border: 1px solid rgba(255, 77, 77, 0.3); border-radius: 6px; padding: 10px; margin-top: 15px; font-size: 0.9em; text-align: center;">
                        </div>

                        <button class="btn btn-primary w-100 mt-3" type="submit">Sign In</button>

                    </form>

                    <div class="desktop-controls" style="margin-top: 1rem; margin-bottom: 1rem;">
                        <button type="button" class="btn btn-secondary w-100"
                            style="background-color: #1a1a2e; border: 1px solid #333; color: #ccc; transition: all 0.2s;"
                            onclick="if(window.__pakteeth__ && window.__pakteeth__.quitApp) { window.__pakteeth__.quitApp(); } else { alert('Only available in desktop mode.'); }"
                            onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#ccc'">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2"
                                style="vertical-align: middle; margin-right: 6px;">
                                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                                <polyline points="16 17 21 12 16 7" />
                                <line x1="21" x2="9" y1="12" y2="12" />
                            </svg>
                            Exit to Desktop
                        </button>
                    </div>

                    <div class="demo-notice">
                        <p>© 2026 | Developed by <strong>Ch Zaid||Laiba Hanif||Ayesha Tariq</strong>. All rights
                            reserved.</p>
                    </div>

                </div>
            </div>

        </div>

    </div>

    <script src="js/login.js"></script>
    <script src="js/loader/loader-function.js"></script>



</body>

</html>
