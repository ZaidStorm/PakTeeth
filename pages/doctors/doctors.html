        <!-- Main Content -->
        <main class="main-content">
            <header class="page-header">
                <div class="header-title">
                    <h2>Doctors & Staff Directory</h2>
                </div>
                <div class="header-actions">
                    <button class="btn btn-secondary" onclick="exportStaff()">Export CSV</button>
                    <button class="btn btn-primary" onclick="openStaffModal()">＋ Add Personnel</button>
                </div>
            </header>

            <section class="page-content">

                <div class="toolbar card">
                    <div style="display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 0.5rem;">
                        <select id="searchTypeStaff" class="form-control" style="width: auto;" onchange="filterStaff()">
                            <option value="all">Search By: All</option>
                            <option value="id">ID</option>
                            <option value="name">Name</option>
                            <option value="date">Date</option>
                        </select>
                        <input type="text" id="searchStaff" class="form-control" style="flex: 1;"
                            placeholder="Search name, phone, ID..." onkeyup="filterStaff()">
                    </div>
                    <div style="display: flex; gap: 0.5rem; flex-wrap: wrap;">
                        <select id="filterRole" class="form-control" onchange="filterStaff()">
                            <option value="">All Roles</option>
                            <option value="Doctor">Doctors</option>
                            <option value="Hygienist">Hygienists</option>
                            <option value="Assistant">Assistants</option>
                            <option value="Receptionist">Receptionists</option>
                            <option value="User">System Users</option>
                            <option value="Developer">Developers</option>
                        </select>
                    </div>
                </div>

            </section>
            <!-- Staff Grid -->
            <section>
                <div id="staffGridContainer" class="grid-mode">
                    <!-- Cards will be dynamically rendered by JavaScript -->
                </div>
            </section>
        </main>

    <!-- Add/Edit Staff Modal -->
    <div id="staffModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="staffModalTitle">Add Staff Member</h3>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <form id="staffForm">
                    <input type="hidden" id="staff_id">

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Full Name *</label>
                            <input type="text" id="staff_name" class="form-control" placeholder="Dr. M Ahmed" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Role *</label>
                            <select id="staff_role" class="form-control" required>
                                <option value="Doctor">Doctor</option>
                                <option value="Hygienist">Hygienist</option>
                                <option value="Assistant">Assistant</option>
                                <option value="Receptionist">Receptionist</option>
                                <option value="User">User</option>
                                <option value="Developer">Developer</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Phone # *</label>
                            <input type="tel" id="staff_phone" class="form-control" placeholder="03xx-xxxxxxx" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Email</label>
                            <input type="email" id="staff_email" class="form-control" placeholder="Optional">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Specialization / Department Notes</label>
                            <input type="text" id="staff_spec" class="form-control"
                                placeholder="e.g. Orthodontist, Front Desk">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Appointment Fees (PKR)</label>
                            <input type="number" id="staff_fees" class="form-control" value="0" min="0" step="50" placeholder="e.g. 1500">
                        </div>
                    </div>

                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary modal-close-btn" onclick="Modal.close('staffModal')">Cancel</button>
                <button class="btn btn-primary" onclick="saveStaff()">Save Profile</button>
            </div>
        </div>
