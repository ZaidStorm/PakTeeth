<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Mixed Dentition Odontogram</title>
    <link rel="stylesheet" href="../../css/mixed-odontogram.css">
</head>

<body>

    <h2>Mixed Dentition Odontogram</h2>

    <div class="odontogram">

        <!-- Upper Right -->
        <div class="quadrant">
            <div class="tooth permanent" data-tooth="16">16</div>
            <div class="tooth primary" data-tooth="55">55</div>
            <div class="tooth primary" data-tooth="54">54</div>
            <div class="tooth primary" data-tooth="53">53</div>
            <div class="tooth permanent" data-tooth="12">12</div>
            <div class="tooth permanent" data-tooth="11">11</div>
        </div>

        <!-- Upper Left -->
        <div class="quadrant">
            <div class="tooth permanent" data-tooth="21">21</div>
            <div class="tooth permanent" data-tooth="22">22</div>
            <div class="tooth primary" data-tooth="63">63</div>
            <div class="tooth primary" data-tooth="64">64</div>
            <div class="tooth primary" data-tooth="65">65</div>
            <div class="tooth permanent" data-tooth="26">26</div>
        </div>

        <!-- Lower Left -->
        <div class="quadrant">
            <div class="tooth permanent" data-tooth="36">36</div>
            <div class="tooth primary" data-tooth="75">75</div>
            <div class="tooth primary" data-tooth="74">74</div>
            <div class="tooth primary" data-tooth="73">73</div>
            <div class="tooth permanent" data-tooth="32">32</div>
            <div class="tooth permanent" data-tooth="31">31</div>
        </div>

        <!-- Lower Right -->
        <div class="quadrant">
            <div class="tooth permanent" data-tooth="41">41</div>
            <div class="tooth permanent" data-tooth="42">42</div>
            <div class="tooth primary" data-tooth="83">83</div>
            <div class="tooth primary" data-tooth="84">84</div>
            <div class="tooth primary" data-tooth="85">85</div>
            <div class="tooth permanent" data-tooth="46">46</div>
        </div>

    </div>

    <script src="../../js/mixed-odontogram.js"></script>
</body>

</html>
