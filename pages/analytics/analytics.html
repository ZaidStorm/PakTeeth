        <main class="main-content">
            <div class="analytics-container">

                <header class="page-header">
                    <div class="header-title">
                        <h2>Clinic Analytics</h2>
                    </div>
                    <div class="header-actions">
                        <button class="btn btn-secondary" onclick="exportAnalytics()">Export CSV</button>
                    </div>
                </header>

                <section class="page-content">

                    <div class="toolbar card">
                        <div class="toolbar-inner">
                            <label>Date Range:</label>
                            <input type="date" id="dateStart" class="form-control" onchange="generateReports()">
                            <span>to</span>
                            <input type="date" id="dateEnd" class="form-control" onchange="generateReports()">
                            <button class="btn btn-secondary btn-sm" onclick="setThisMonth()">This Month</button>
                        </div>
                    </div>

                    <!-- Encounter Stats -->
                    <div class="card stats-card">
                        <h3>Quick Stats</h3>
                        <div class="kpi-grid">
                            <div class="kpi-card">
                                <div class="kpi-title">New Patients</div>
                                <div class="kpi-value" id="statNewPatients">0</div>
                            </div>
                            <div class="kpi-card">
                                <div class="kpi-title">Total Appointments</div>
                                <div class="kpi-value" id="statAppointments">0</div>
                            </div>
                            <div class="kpi-card">
                                <div class="kpi-title">Prescriptions Written</div>
                                <div class="kpi-value" id="statPrescriptions">0</div>
                            </div>
                        </div>
                    </div>

                </section>

            </div>
